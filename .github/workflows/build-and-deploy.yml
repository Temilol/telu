name: Build and Deploy Page

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      # environment created automatically by GitHub
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      # Configure GitHub Pages
      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Create firebase-config.js from GitHub Secrets
      - name: Create Firebase Config
        run: |
          cat > js/firebase-config.js << 'EOF'
          // Firebase Configuration - Generated from secrets during build
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
            measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };
          EOF

      # Setup Node.js for build-auth.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # Verify ADMIN_PASSWORD secret is set
      - name: Verify GitHub Secret
        run: |
          if [ -z "${{ secrets.ADMIN_PASSWORD }}" ]; then
            echo "❌ ERROR: ADMIN_PASSWORD secret not set!"
            echo ""
            echo "To fix this:"
            echo "1. Go to your repository Settings"
            echo "2. Click 'Secrets and variables' → 'Actions'"
            echo "3. Click 'New repository secret'"
            echo "4. Name: ADMIN_PASSWORD"
            echo "5. Value: your actual admin password"
            echo "6. Click 'Add secret'"
            exit 1
          fi

      # Create .env file from GitHub Secrets
      - name: Create Authentication Config
        run: |
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" > .env
          echo "✓ .env file created"

      # Build seating-auth.js with password from .env
      - name: Build Authentication Script
        run: node build-auth.js

      # Verify seating-auth.js was generated
      - name: Verify Auth Script
        run: |
          if [ -f js/seating-auth.js ]; then
            echo "✓ seating-auth.js generated successfully"
          else
            echo "✗ Failed to generate seating-auth.js"
            exit 1
          fi

      # Cleanup - Remove .env file before deployment
      - name: Cleanup
        if: always()
        run: rm -f .env

      # Upload artifacts to GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
