<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Toluwani & Temilola — Seating Chart View (White)</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../../logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/seating-shared.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<header>
  <h1>Seating Chart</h1>
  <p>White Wedding Reception</p>
  <button id="logoutBtn" class="logout-btn" style="position: absolute; top: 20px; right: 20px; padding: 8px 16px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;" onclick="logout()">🚪 Logout</button>
</header>

<div class="container">
  <div class="controls">
    <div>
      <a href="editor.html" class="btn btn-secondary"><i class="fa-solid fa-pen-to-square"></i> Edit Seating</a>
    </div>
    <div>
      <div class="export-menu-container">
        <button id="exportMenuBtn" class="btn btn-primary">
          📥 Export
        </button>
        <div id="exportMenu" class="export-dropdown">
          <button class="export-option" data-format="png">📊 PNG</button>
          <button class="export-option" data-format="svg">🎨 SVG</button>
          <button class="export-option" data-format="pdf">📄 PDF</button>
        </div>
      </div>
    </div>
  </div>

  <div id="content" class="loading">Loading seating chart...</div>
</div>

<!-- Authentication -->
<script src="../../js/seating-auth.js"></script>
<script>requireAuth();</script>

<!-- Export functionality -->
<script src="../../js/seating-view-export.js"></script>

<!-- Firebase SDK -->
<script type="module" src="../../js/firebase-init.js"></script>

<script>
  // Set event ID for this page
  window.currentEventId = "wedding-seating-chart-white";
</script>

<!-- Shared seating view logic -->
<script src="../../js/seating-view.js"></script>

</body>
</html>
