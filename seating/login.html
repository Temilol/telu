<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Seating Admin Login — Toluwani & Temilola</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary: #C68A65;
      --color-secondary: #E9D6CF;
      --color-text: #3B2F2F;
      --color-bg: #F8F4F1;
      --card-bg: #FFFFFF;
      --shadow: rgba(0, 0, 0, 0.06);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--color-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 16px var(--shadow);
      max-width: 420px;
      width: 100%;
      padding: 50px 40px;
      border-top: 4px solid var(--color-primary);
    }

    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-icon {
      font-size: 50px;
      margin-bottom: 15px;
      font-weight: 300;
    }

    .login-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--color-primary);
      margin-bottom: 5px;
      font-weight: 600;
    }

    .login-header p {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    .password-input-wrapper {
      position: relative;
      display: block;
      width: 100%;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 44px 12px 14px !important;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
      background: white;
      box-sizing: border-box;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--color-primary);
      padding: 4px 8px;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
    }

    .toggle-password:hover {
      color: #b57753;
    }

    input[type="password"]:focus,
    input[type="text"].password-visible:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(198, 138, 101, 0.08);
      background: #fafafa;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 28px;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--color-primary);
    }

    .remember-me label {
      margin: 0;
      cursor: pointer;
      color: #888;
      font-weight: 400;
    }

    .form-actions {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn-login {
      background: var(--color-primary);
      color: white;
    }

    .btn-login:hover {
      background: #b57753;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(198, 138, 101, 0.2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-back {
      background: var(--color-secondary);
      color: var(--color-text);
      border: 1px solid #ddd;
      font-weight: 500;
    }

    .btn-back:hover {
      background: #ddc7b8;
    }

    .error-message {
      background: #fff3f3;
      border: 1px solid #e8b4b4;
      color: #c62828;
      padding: 12px 14px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .info-text {
      background: var(--color-secondary);
      border-left: 4px solid var(--color-primary);
      padding: 12px 14px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--color-text);
      margin-top: 24px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-icon">🔐</div>
    <h1>Admin Access</h1>
    <p>Seating Chart Administration</p>
  </div>

  <div id="errorMessage" class="error-message"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="password">Admin Password</label>
      <div class="password-input-wrapper">
        <input 
          type="password" 
          id="password" 
          placeholder="Enter password"
          autocomplete="off"
          required
        >
        <button type="button" class="toggle-password" id="togglePassword" title="Show password" aria-label="Show password">
          <i class="fas fa-eye-slash"></i>
        </button>
      </div>
    </div>

    <div class="remember-me">
      <input type="checkbox" id="rememberMe" checked>
      <label for="rememberMe">Remember me for 30 days</label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-back" onclick="window.location.href='../'">
        Back
      </button>
      <button type="submit" class="btn-login">
        🔓 Login
      </button>
    </div>
  </form>

  <div class="info-text">
    💡 <strong>Admin Only:</strong> This page is for seating chart administration only.
  </div>

  <div style="background: #f0f8ff; border-left: 4px solid #4CAF50; padding: 12px 14px; border-radius: 4px; font-size: 12px; color: var(--color-text); margin-top: 20px; line-height: 1.6;">
    👋 <strong>Guest?</strong> If you got here by mistake, <a href="../" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">click here to go back home</a>.
  </div>
</div>

<script src="../js/seating-auth.js"></script>
<script>
  // Redirect to seating hub if already authenticated
  if (isAuthenticated()) {
    window.location.href = 'index.html';
  }

  // Toggle password visibility
  const togglePasswordBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const toggleIcon = togglePasswordBtn.querySelector('i');

  togglePasswordBtn.addEventListener('click', function(e) {
    e.preventDefault();
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleIcon.classList.remove('fa-eye-slash');
      toggleIcon.classList.add('fa-eye');
      togglePasswordBtn.title = 'Hide password';
      togglePasswordBtn.setAttribute('aria-label', 'Hide password');
    } else {
      passwordInput.type = 'password';
      toggleIcon.classList.remove('fa-eye');
      toggleIcon.classList.add('fa-eye-slash');
      togglePasswordBtn.title = 'Show password';
      togglePasswordBtn.setAttribute('aria-label', 'Show password');
    }
  });

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('errorMessage');

    if (authenticate(password)) {
      // Success - redirect to seating hub
      window.location.href = 'index.html';
    } else {
      // Show error
      errorMessage.textContent = '❌ Invalid password. Please try again.';
      errorMessage.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  });
</script>

</body>
</html>
